<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Teresita</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #ff385c;
            color: white;
            padding: 15px;
            text-align: center;
        }

        #contenedor {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
        }

        .card p {
            margin: 10px;
            color: gray;
        }

        /* BOTONES */
        .boton {
            background: #ff385c;
            color: white;
            border: none;
            padding: 10px;
            width: 90%;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .boton:hover {
            background: #e31c5f;
        }

        .eliminar {
            background: black;
            color: white;
            border: none;
            padding: 8px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* PANEL ADMIN */
        .admin {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        .admin input {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>

<body>

<header>
    <h1>🏠 Teresita</h1>
</header>

<!-- PANEL ADMIN -->
<div class="admin">
    <h2>Panel Administrador</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="precio" placeholder="Precio">
    <input type="text" id="imagen" placeholder="URL Imagen">

    <button class="boton" onclick="agregarAlojamiento()">Agregar</button>
</div>

<!-- CONTENEDOR -->
<main id="contenedor"></main>

<script>
let alojamientos = [
    {
        nombre: "Casa Calida",
        precio: "$1200 MXN/noche",
        imagen: "https://picsum.photos/300/200?random=1"
    },
    {
        nombre: "Casa Mar Oriental",
        precio: "$900 MXN/noche",
        imagen: "https://picsum.photos/300/200?random=2"
    },
    {
        nombre: "Departamento en la ciudad",
        precio: "$1500 MXN/noche",
        imagen: "https://picsum.photos/300/200?random=3"
    }
];

const contenedor = document.getElementById("contenedor");

function mostrarAlojamientos() {
    contenedor.innerHTML = "";

    alojamientos.forEach((lugar, index) => {
        contenedor.innerHTML += `
            <div class="card">
                <img src="${lugar.imagen}">
                <h3>${lugar.nombre}</h3>
                <p>${lugar.precio}</p>

                <button class="boton" onclick="reservar('${lugar.nombre}')">
                    Reservar
                </button>

                <button class="eliminar" onclick="eliminar(${index})">
                    Eliminar
                </button>
            </div>
        `;
    });
}

mostrarAlojamientos();

/* RESERVAR */
function reservar(nombre) {
    alert("✅ Has reservado: " + nombre);
}

/* AGREGAR */
function agregarAlojamiento() {
    const nombre = document.getElementById("nombre").value;
    const precio = document.getElementById("precio").value;
    const imagen = document.getElementById("imagen").value;

    if (!nombre || !precio || !imagen) {
        alert("⚠️ Llena todos los campos");
        return;
    }

    alojamientos.push({ nombre, precio, imagen });

    mostrarAlojamientos();
}

/* ELIMINAR */
function eliminar(index) {
    alojamientos.splice(index, 1);
    mostrarAlojamientos();
}
</script>

</body>
</html>
